<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Abastech">
    <meta name="application-name" content="Abastech">
    <meta name="msapplication-TileColor" content="#d4a017">
    <meta name="theme-color" content="#1f1b16">
    
    <title>Abastech - Gestão de Equipamentos</title>
    <meta name="description" content="Sistema inteligente de gestão de equipamentos, veículos e manutenção">
    <meta name="author" content="Abastech" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" href="/images/logo-abastech.png">
    <link rel="apple-touch-icon" href="/images/logo-abastech.png">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Abastech - Gestão de Equipamentos">
    <meta property="og:description" content="Sistema inteligente de gestão de equipamentos, veículos e manutenção">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abastech - Gestão de Equipamentos">
    <meta name="twitter:description" content="Sistema inteligente de gestão de equipamentos, veículos e manutenção">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
